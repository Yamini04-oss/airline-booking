<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyTravel - Airline Booking</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div class="login-header">
                <div class="airline-logo">✈</div>
                <h1>SkyTravel</h1>
                <p>Book your perfect flight</p>
            </div>

            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group-login">
                    <label for="username">Username</label>
                    <input 
                        type="text" 
                        id="username" 
                        placeholder="Enter your username" 
                        required
                    >
                </div>

                <div class="form-group-login">
                    <label for="password">Password</label>
                    <input 
                        type="password" 
                        id="password" 
                        placeholder="Enter your password" 
                        required
                    >
                </div>

                <div class="remember-me">
                    <input type="checkbox" id="rememberMe">
                    <label for="rememberMe" style="margin-bottom: 0;">Remember me</label>
                </div>

                <button type="submit" class="btn btn-primary btn-large">
                    Login
                </button>
            </form>

            <p style="margin-top: 20px; font-size: 13px; color: var(--text-light);">
                Demo: Use any username and password
            </p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
