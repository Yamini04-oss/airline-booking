<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Search Flights - SkyTravel</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="header">
    <div class="container">
      <div style="display:flex; align-items:center; justify-content:center; gap:10px;">
        <div class="logo">✈</div>
        <div>
          <div class="header-title">SkyTravel</div>
          <div class="header-subtitle">Search and book flights with ease</div>
        </div>
      </div>
    </div>
  </header>

  <main class="container">
    <section class="card search-container">
      <div class="container">
        <form id="searchForm" class="search-form">
          <div class="form-group">
            <label for="from">From</label>
            <input type="text" id="from" placeholder="City or airport" required>
          </div>

          <div class="form-group">
            <label for="to">To</label>
            <input type="text" id="to" placeholder="City or airport" required>
          </div>

          <div class="form-group">
            <label for="depart">Departure Date</label>
            <input type="date" id="depart" required>
          </div>

          <div class="form-group">
            <label for="returnDate">Return Date (optional)</label>
            <input type="date" id="returnDate">
          </div>

          <div class="form-group">
            <label for="passengers">Passengers</label>
            <select id="passengers">
              <option value="1">1</option>
              <option value="2">2</option>
              <option value="3">3</option>
              <option value="4">4</option>
            </select>
          </div>

          <div class="form-group">
            <button class="btn btn-primary" type="submit">Search Flights</button>
          </div>
        </form>
      </div>
    </section>

    <section style="margin-top: 30px;">
      <div class="card">
        <h3 class="card-title">Popular Destinations</h3>
        <p class="card-subtitle">Explore popular routes to plan your next trip.</p>
        <div style="display:flex; gap:12px; margin-top:16px; flex-wrap:wrap;">
          <div class="card" style="padding:12px; min-width: 140px;">Mumbai ↔ Delhi</div>
          <div class="card" style="padding:12px; min-width: 140px;">Bengaluru ↔ Kolkata</div>
          <div class="card" style="padding:12px; min-width: 140px;">Hyderabad ↔ Chennai</div>
        </div>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
